<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>دعوة زفاف</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- React + Babel (for simple GH Pages deployment) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const locations = {
        bride: { lat: 32.72994031076563, lng: 35.33150776787783 },
        groom: { lat: 32.860545879128274, lng: 35.36518616681326 },
        church: { lat: 32.86251383947627, lng: 35.36480494931609 },
        final: { lat: 32.87102701117922, lng: 35.31001177592231 },
        restaurant: { lat: 32.85646685260385, lng: 35.326665956262424 }
      };

      function getParam(name){
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function wazeUrl({lat,lng}){ return `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`; }
      function googleUrl({lat,lng}){ return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`; }

      function Countdown(){
        const [timeLeft, setTimeLeft] = useState({days:0, hours:0, minutes:0, seconds:0});

        useEffect(() => {
          const targetDate = new Date('2026-04-17T00:00:00');
          const interval = setInterval(() => {
            const now = new Date();
            const diff = targetDate - now;
            if (diff > 0) {
              const days = Math.floor(diff / (1000 * 60 * 60 * 24));
              const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
              const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
              const seconds = Math.floor((diff % (1000 * 60)) / 1000);
              setTimeLeft({days, hours, minutes, seconds});
            } else {
              setTimeLeft({days:0, hours:0, minutes:0, seconds:0});
            }
          }, 1000);
          return () => clearInterval(interval);
        }, []);

        return (
          <div className="countdown">
            <p>العد التنازلي للزفاف: {timeLeft.days} يوم {timeLeft.hours} ساعة {timeLeft.minutes} دقيقة {timeLeft.seconds} ثانية</p>
          </div>
        );
      }

      function LocationCard({title, coords, time, date}){
        return (
          <div className="card">
            <h3>{title}</h3>
            <p className="time">{date} - {time}</p>
            <div className="buttons">
              <a className="btn waze" href={wazeUrl(coords)} target="_blank" rel="noopener">افتح في واز</a>
              <a className="btn maps" href={googleUrl(coords)} target="_blank" rel="noopener">افتح في الخرائط</a>
            </div>
          </div>
        );
      }

      function App(){
        const brideParam = getParam('bride') === 'true';
        const groomParam = getParam('groom') === 'true';

        const locationList = [
          { title: "منزل عائلة العريس", coords: locations.groom, date: "14-17.04.2026", time: "الساعة 10:00 صباحاً" },
          { title: "كنيسة مار يوحنا (كليل)", coords: locations.church, date: "17.04.2026", time: "الساعة 17:00 ظهراً" },
          { title: "قاعة الرويال", coords: locations.final, date: "17.04.2026", time: "الساعة 20:00 مساءً" }
        ];

        if (brideParam) {
          locationList.unshift({ title: "منزل عائلة العروس (طلعة)", coords: locations.bride, date: "17.04.2026", time: "الساعة 15:00 ظهراً"  });
        }

        if (groomParam) {
          locationList.push({ title: "مطعم ذهب (زيانة)", coords: locations.restaurant, date: "15.04.2026", time: "الساعة 20:00 مساءً" });
        }

        return (
          <div className="container">
            <header>
              <h1>زفاف نور وروان</h1>
              <Countdown />
              <p className="subtitle">مرحباً — تفاصيل الأماكن أدناه. اضغط لفتح التطبيق المفضل على هاتفك.</p>
            </header>

            <section className="invite">
              <h2>صورة الدعوة</h2>
              <img src="invite1.jpg" alt="صورة الدعوة العامة" />
              {groomParam && <img src="invite2.jpg" alt="صورة الدعوة لحفلة العريس" />}
            </section>

            <section className="locations">
              {locationList.map((loc, i) => <LocationCard key={i} title={loc.title} coords={loc.coords} time={loc.time} date={loc.date} />)}
            </section>

            <footer>
              <p>انضمامكم إلينا في هذا اليوم الخاص يسعدنا</p>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
