<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>دعوة زفاف</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- React + Babel (for simple GH Pages deployment) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
      const locations = {
        bride: { lat: 31.778, lng: 35.235 },
        groom: { lat: 32.085, lng: 34.781 },
        church: { lat: 31.771959, lng: 35.217018 },
        final: { lat: 31.765, lng: 35.22 },
        restaurant: { lat: 32.08, lng: 34.78 }
      };

      function getParam(name){
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function wazeUrl({lat,lng}){ return `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`; }
      function googleUrl({lat,lng}){ return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`; }

      function LocationCard({title, coords}){
        return (
          <div className="card">
            <h3>{title}</h3>
            <div className="buttons">
              <a className="btn waze" href={wazeUrl(coords)} target="_blank" rel="noopener">افتح في واز</a>
              <a className="btn maps" href={googleUrl(coords)} target="_blank" rel="noopener">افتح في الخرائط</a>
            </div>
          </div>
        );
      }

      function App(){
        const brideParam = getParam('bride') === 'true';
        const groomParam = getParam('groom') === 'true';

        const locationList = [
          { title: "منزل عائلة العريس", coords: locations.groom },
          { title: "الكنيسة (مكان الزواج)", coords: locations.church },
          { title: "قاعة الرويال", coords: locations.final }
        ];

        if (brideParam) {
          locationList.unshift({ title: "منزل عائلة العروس", coords: locations.bride });
        }

        if (groomParam) {
          locationList.push({ title: "مطعم ذهب", coords: locations.restaurant });
        }

        return (
          <div className="container">
            <header>
              <h1>دعوة زفاف</h1>
              <p className="subtitle">مرحباً — تفاصيل الأماكن أدناه. اضغط لفتح التطبيق المفضل على هاتفك.</p>
            </header>

            <section className="invite">
              <h2>صورة الدعوة</h2>
              <img src="invite1.jpg" alt="صورة الدعوة العامة" />
              {groomParam && <img src="invite2.jpg" alt="صورة الدعوة لحفلة العريس" />}
            </section>

            <section className="locations">
              {locationList.map((loc, i) => <LocationCard key={i} title={loc.title} coords={loc.coords} />)}
            </section>

            <footer>
              <p className="note">لعرض موقع العروس، أضف ?bride=true إلى الرابط. لحفلة العريس، أضف ?groom=true</p>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
